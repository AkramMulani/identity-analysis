<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facial Recognition App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }
        .card {
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border-radius: 1rem;
        }
        #loading .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        #result {
            font-size: 1.1em;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4" style="width: 100%; max-width: 450px;">
        <h1 class="mb-4 text-center text-primary">Facial Recognition</h1>
        <!-- Add Person Form -->
        <div class="mb-4">
            <h5 class="text-success">Register New Person</h5>
            <form id="addPersonForm" enctype="multipart/form-data">
                <div class="mb-2">
                    <label for="personName" class="form-label">Name</label>
                    <input class="form-control" type="text" id="personName" name="name" required>
                </div>
                <div class="mb-2">
                    <label for="personAge" class="form-label">Age</label>
                    <input class="form-control" type="number" id="personAge" name="age">
                </div>
                <div class="mb-2">
                    <label for="personGender" class="form-label">Gender</label>
                    <select class="form-select" id="personGender" name="gender">
                        <option value="">Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label for="personAddress" class="form-label">Address</label>
                    <input class="form-control" type="text" id="personAddress" name="address">
                </div>
                <div class="mb-2">
                    <label for="personPhoto" class="form-label">Photo</label>
                    <input class="form-control" type="file" id="personPhoto" name="image" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Add Person</button>
            </form>
            <div id="addPersonResult" class="mt-3 text-center"></div>
            <div id="addPersonLoading" class="text-center mt-2" style="display:none;">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <div class="mt-2 text-secondary">Registering, please wait...</div>
            </div>
        </div>
        <!-- Compare Form -->
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="photo" class="form-label">Upload Photo to Compare</label>
                <input class="form-control" type="file" id="photo" name="photo" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Compare</button>
        </form>
        <div id="result" class="mt-4 text-center"></div>
        <div id="loading" class="text-center mt-4" style="display:none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <div class="mt-2 text-secondary">Processing, please wait...</div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
