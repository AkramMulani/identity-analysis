<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compare Faces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        html, body {
            height: 100vh;
            min-height: 100vh;
            /* overflow: hidden; */
        }
        body {
            min-height: 100vh;
            height: 100vh;
            background: url("{{ url_for('static', filename='compare-bg2.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 24, 48, 0.82);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
        }
        .card {
            /* background: url("{{ url_for('static', filename='compare-bg.jpg') }}") no-repeat center center fixed;; */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
            animation: fadeInUp 1.2s cubic-bezier(.39,.575,.565,1) both;
            background: rgba(131, 146, 171, 0.82);
        }
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h2 {
            font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
            letter-spacing: 2px;
            font-weight: 700;
            color: #0a1830cc;
            /* text-shadow: 0 2px 8px #0a1830cc; */
            animation: neonGlow 2s infinite alternate;
        }
        /* @keyframes neonGlow {
            from { text-shadow: 0 0 8px #00e6e6, 0 0 16px #00e6e6; }
            to { text-shadow: 0 0 16px #00e6e6, 0 0 32px #00e6e6; }
        } */
        .form-label, .form-control {
            color: #e0eafc;
            background: rgba(10,24,48,0.25);
            border: 1px solid #00e6e6;
            border-radius: 0.5rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 2px #00e6e6;
            background: rgba(10,24,48,0.35);
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #0077b6 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            /* box-shadow: 0 2px 8px #00e6e6cc; */
        }
        .btn-primary:hover {
            transform: scale(1.04);
            /* box-shadow: 0 4px 16px #00e6e6cc; */
        }
        #result {
            font-size: 1.1em;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 1px 4px #0a1830cc;
        }
        #loading {
            background: rgba(10,24,48,0.35);
            border-radius: 1rem;
            padding: 1rem 0;
        }
        .compare-icon {
            display: block;
            margin: 0 auto 1.5rem auto;
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 50%;
            border: 3px solid #00e6e6;
            background: #fff;
            box-shadow: 0 0 24px #00e6e6cc, 0 4px 24px #0a1830cc;
            animation: pulse 2.5s infinite;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .compare-icon:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 0 36px #00e6e6, 0 8px 32px #0a1830cc;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .btn-link {
            /* color: #fff; */
            color: #0077b6;
            font-weight: 700;
            width: 40%;
            margin-left: 8em;
            text-decoration: none;
            background: #fff;
            /* border: 1px solid #00e6e6; */
            border-radius: 0.5rem;
            padding: 0.4rem 1.2rem;
            margin-top: 1rem;
            transition: color 0.2s, background 0.2s, border 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px #00e6e622;
            display: inline-block;
        }
        .btn-link:hover, .btn-link:focus {
            color: #fff;
            background: linear-gradient(90deg, #0077b6 100%);
            /* border: 1px solid #00e6e6; */
            /* text-decoration: none; */
            /* box-shadow: 0 4px 16px #00e6e644; */
        }

        /* Info panel for left side */
        .info-panel {
            background: rgba(10, 24, 48, 0.72);
            border-radius: 1.2rem;
            padding: 2.5rem 2rem 2.5rem 2rem;
            box-shadow: 0 4px 32px 0 rgba(31, 38, 135, 0.25);
            animation: fadeInLeft 1.2s cubic-bezier(.39,.575,.565,1) both;
        }
        .info-panel h1, .info-panel p {
            color: #e0eafc;
            /* text-shadow: 0 2px 12px #0a1830cc, 0 1px 8px #00e6e6cc; */
        }
        @keyframes fadeInLeft {
            0% {
                opacity: 0;
                transform: translateX(-40px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .forensic-layout {
            position: relative;
            z-index: 2;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
        }

        .min-vh-0 {
            min-height: 0;
        }

        .forensic-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            height: 100%;
        }

        .results-container {
            background: rgba(10,24,48,0.65);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            overflow-y: auto;
            min-height: 0;
            height: 100%;
        }

        .forensic-result-card {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            color: white;
            transition: 0.3s;
        }

        .forensic-result-card:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>
<div class="container-fluid forensic-layout">

    <div class="row g-4 flex-grow-0">

        <!-- Left Info -->
        <div class="col-lg-4 d-flex">
            <div class="info-panel h-100 w-100">
                <h1 class="display-6 fw-bold mb-3">
                    Forensic Face Comparison
                </h1>

                <p class="lead">
                    Upload a photograph and compare it
                    against registered identities using
                    facial analysis and biometric matching.
                </p>

                <hr>

                <ul class="text-light">
                    <li>Face Detection</li>
                    <li>Biometric Comparison</li>
                    <li>Identity Resolution</li>
                    <li>Person Matching</li>
                </ul>
            </div>
        </div>

        <!-- Upload Area -->
        <div class="col-lg-8 d-flex">

            <div class="card forensic-card w-100">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Compare Faces
                    </h2>

                    <form id="uploadForm"
                          enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">
                                Capture from camera
                            </label>
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <button type="button" class="btn btn-outline-light btn-sm" id="photoCameraBtn">Capture from Camera</button>
                                <span class="text-light small" id="photoCameraLabel">No image selected</span>
                            </div>
                            <input
                                class="form-control d-none"
                                type="file"
                                id="photoCamera"
                                name="camera_image"
                                accept="image/*"
                                capture="environment">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Choose from storage
                            </label>
                            <input
                                class="form-control"
                                type="file"
                                id="photoStorage"
                                name="image"
                                accept="image/*">
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Compare Face
                        </button>

                    </form>

                    <div id="loading"
                         class="text-center mt-4"
                         style="display:none;">

                        <div class="spinner-border text-primary"></div>

                        <div class="mt-2">
                            Processing...
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Results Section -->

    <div class="row flex-grow-1 min-vh-0 px-0 pb-0">

        <div class="col-12 d-flex min-vh-0">

            <div class="results-container w-100">

                <h3 class="mb-3 text-light">
                    Comparison Results
                </h3>

                <div id="result"></div>

            </div>

        </div>

    </div>

</div>
<div id="cameraModal" class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-75" style="z-index: 1050;">
    <div class="position-relative bg-dark rounded p-3 m-4 mx-auto" style="max-width: 720px;">
        <button type="button" id="cameraCloseBtn" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" aria-label="Close"></button>
        <video id="cameraVideo" autoplay playsinline class="w-100 rounded"></video>
        <div class="d-flex justify-content-center gap-2 mt-3">
            <button type="button" id="cameraCaptureBtn" class="btn btn-success">Capture</button>
            <button type="button" id="cameraCancelBtn" class="btn btn-outline-light">Cancel</button>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
