<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: url('/static/compare-bg.jpg') center center/cover no-repeat fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 24, 48, 0.84);
            z-index: 0;
        }

        .page-shell {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: clamp(1rem, 3vw, 2rem);
        }

        .panel {
            background: rgba(10, 24, 48, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 1.4rem;
            padding: 2rem;
            color: #fff;
        }

        .btn-outline-light {
            border-radius: 0.85rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="page-shell container-fluid d-flex align-items-center justify-content-center">
        <div class="panel w-100" style="max-width: 48rem;">
            <div class="badge bg-info text-dark mb-3">Placeholder</div>
            <h1 class="h3 fw-bold mb-3">Settings</h1>
            <p class="text-light mb-4">This section is reserved for future administrative configuration.</p>
            <div class="d-flex flex-wrap gap-2">
                <a href="/dashboard" class="btn btn-outline-light">Back to Dashboard</a>
                <a href="/logout" class="btn btn-outline-light">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
